name: auth_chat_interface
description: Chat VeigaGustavo — interface de conversas em tempo real.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  dio: ^5.9.0
  stomp_dart_client: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: branding/app_logo.png
  remove_alpha_ios: true
  android: true
  ios: true
  web:
    generate: true
    background_color: "#FAFAFA"
    theme_color: "#0A0A0A"
  min_sdk_android: 21
  adaptive_icon_background: "#FAFAFA"
  adaptive_icon_foreground: branding/app_logo.png

flutter:
  uses-material-design: true
  assets:
    # Caminho sem prefixo `assets/` no nome lógico — evita `assets/assets/...` no Web.
    - branding/app_logo.png
